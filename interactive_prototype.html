<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PreCharge Pro</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
}

.app{
    width:100%;
    max-width:420px;
    padding:20px;
    min-height:100vh;
}

/* HEADER */
.header{
    margin-top:10px;
    margin-bottom:25px;
}
.title{
    font-size:24px;
    font-weight:bold;
}
.subtitle{
    font-size:14px;
    color:#94a3b8;
    margin-top:5px;
}

/* CARD */
.card{
    background:#1e293b;
    padding:18px;
    border-radius:18px;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* INPUTS */
label{
    font-size:13px;
    color:#cbd5e1;
}
select,input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
}

/* SLIDER */
.range-wrapper{
    margin-bottom:14px;
}
.range-value{
    font-size:14px;
    margin-top:5px;
    color:#38bdf8;
}

/* BUTTON */
.button{
    background:#7c3aed;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* RESULT */
.result{
    margin-top:15px;
    font-size:14px;
    line-height:1.6;
}
.highlight{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#22d3ee;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div class="title">PreCharge Pro</div>
        <div class="subtitle">
            Estimate your charging cost before you plug in.
        </div>
    </div>

    <div class="card">

        <label>Select Vehicle</label>
        <select id="carSelect">
            <option value="60">Tesla Model 3 Standard (60 kWh)</option>
            <option value="82">Tesla Model 3 Long Range (82 kWh)</option>
            <option value="60.48">BYD Atto 3 (60.48 kWh)</option>
            <option value="64">MG4 64 kWh</option>
        </select>

        <label>Current Battery (%)</label>
        <input type="number" id="current" value="20">

        <label>Target Battery (%)</label>
        <div class="range-wrapper">
            <input type="range" id="target" min="10" max="100" value="80">
            <div class="range-value" id="rangeValue">Target: 80%</div>
        </div>

        <label>Charging Rate (Baht/kWh)</label>
        <input type="number" id="rate" value="7.5">

        <label>Charger Power (kW)</label>
        <select id="charger">
            <option value="7">AC 7 kW</option>
            <option value="60">DC 60 kW</option>
            <option value="120">DC 120 kW</option>
        </select>

        <div class="button" onclick="calculate()">
            Calculate
        </div>

        <div class="result" id="result"></div>

    </div>

</div>

<script>
const topUpOptions=[100,200,300,500,1000,2000];

document.getElementById("target").oninput=function(){
    document.getElementById("rangeValue").innerText="Target: "+this.value+"%";
};

function smartTopUp(cost){
    let remaining=Math.ceil(cost);
    let combo=[];
    const options=[...topUpOptions].sort((a,b)=>b-a);

    for(let amount of options){
        while(remaining>=amount){
            combo.push(amount);
            remaining-=amount;
        }
    }

    if(remaining>0){
        combo.push(options[options.length-1]);
    }

    const total=combo.reduce((a,b)=>a+b,0);
    return {combo,total,leftover:total-cost};
}

function calculate(){
    let battery=parseFloat(document.getElementById("carSelect").value);
    let current=parseFloat(document.getElementById("current").value);
    let target=parseFloat(document.getElementById("target").value);
    let rate=parseFloat(document.getElementById("rate").value);
    let charger=parseFloat(document.getElementById("charger").value);

    if(target<=current){
        document.getElementById("result").innerHTML="⚠ Target must be higher than current.";
        return;
    }

    let efficiency=0.9;
    let percent=(target-current)/100;
    let energy=battery*percent;
    let meterEnergy=energy/efficiency;
    let cost=meterEnergy*rate;
    let time=(meterEnergy/charger)*60;

    let plan=smartTopUp(cost);

    document.getElementById("result").innerHTML=
        "🔋 Energy: "+meterEnergy.toFixed(2)+" kWh<br>"+
        "⏱ Time: "+time.toFixed(0)+" minutes<br>"+
        "💰 Estimated Cost: "+cost.toFixed(2)+" Baht<br>"+
        "<div class='highlight'>Top-Up Plan: "+
        plan.combo.join(" + ")+" = "+plan.total+" Baht</div>"+
        "Remaining: "+plan.leftover.toFixed(2)+" Baht";
}
</script>

</body>
</html>
