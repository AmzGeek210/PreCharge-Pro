<title>ProCharge</title>
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
}
.app{
    width:100%;
    max-width:420px;
    padding:20px;
    min-height:100vh;
    box-sizing:border-box;
}
.header{
    margin-top:10px;
    margin-bottom:25px;
}
.title{
    font-size:26px;
    font-weight:700;
}
.subtitle{
    font-size:14px;
    color:#94a3b8;
    margin-top:5px;
    line-height:1.5;
}
.card{
    background:#1e293b;
    padding:18px;
    border-radius:18px;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}
label{
    display:block;
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:2px;
}
select,input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
    box-sizing:border-box;
}
select{
    appearance:none;
}
.range-wrapper{
    margin-bottom:14px;
}
.range-value{
    font-size:14px;
    margin-top:-6px;
    margin-bottom:8px;
    color:#38bdf8;
}
.button{
    background:#7c3aed;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    user-select:none;
}
.button:hover{
    filter:brightness(1.05);
}
.result{
    margin-top:15px;
    font-size:14px;
    line-height:1.7;
    color:#e2e8f0;
}
.highlight{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#22d3ee;
}
.note{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
    line-height:1.5;
}
.small{
    color:#94a3b8;
    font-size:13px;
}
</style>
</head>

<script>
const topUpOptions = [100, 200, 300, 500, 1000, 2000];

document.getElementById("target").addEventListener("input", function(){
    document.getElementById("rangeValue").innerText = "Target: " + this.value + "%";
});

function getRateByPower(power, timeType){
    if (power < 50){
        return timeType === "peak" ? 6.9 : 5.3;
    } else if (power < 100){
        return timeType === "peak" ? 8.2 : 6.3;
    } else if (power < 300){
        return timeType === "peak" ? 8.5 : 6.5;
    } else {
        return timeType === "peak" ? 9.7 : 7.2;
    }
}

function smartTopUp(cost){
    const targetCost = Math.ceil(cost);
    let bestTotal = null;
    let bestCombo = [];

    function search(sum, combo, startIndex){
        if (sum >= targetCost){
            if (bestTotal === null || sum < bestTotal){
                bestTotal = sum;
                bestCombo = [...combo];
            }
            return;
        }

        if (bestTotal !== null && sum >= bestTotal) return;

        for (let i = startIndex; i < topUpOptions.length; i++){
            combo.push(topUpOptions[i]);
            search(sum + topUpOptions[i], combo, i);
            combo.pop();
        }
    }

    search(0, [], 0);

    return {
        combo: bestCombo,
        total: bestTotal,
        leftover: bestTotal - cost
    };
}

function formatTime(totalMinutes){
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.round(totalMinutes % 60);

    if (hours <= 0){
        return minutes + " minutes";
    }
    return hours + "h " + minutes + "m";
}

function calculate(){
    const carSelect = document.getElementById("carSelect");
    const selectedOption = carSelect.options[carSelect.selectedIndex];

    const battery = parseFloat(selectedOption.dataset.battery);
    const vehicleLabel = selectedOption.text;

    const current = parseFloat(document.getElementById("current").value);
    const target = parseFloat(document.getElementById("target").value);
    const timeType = document.getElementById("timeType").value;

    const chargerRaw = document.getElementById("charger").value;
    const [chargerName, chargerPowerText] = chargerRaw.split("|");
    const chargerPower = parseFloat(chargerPowerText);

    if (!battery){
        document.getElementById("result").innerHTML = "⚠ Please select a vehicle.";
        return;
    }

    if (isNaN(current) || isNaN(target)){
        document.getElementById("result").innerHTML = "⚠ Please enter battery percentages.";
        return;
    }

    if (current < 0 || current > 100 || target < 0 || target > 100){
        document.getElementById("result").innerHTML = "⚠ Battery percentage must be between 0 and 100.";
        return;
    }

    if (target <= current){
        document.getElementById("result").innerHTML = "⚠ Target must be higher than current.";
        return;
    }

    const efficiency = 0.9;
    const percent = (target - current) / 100;
    const energyToBattery = battery * percent;
    const meterEnergy = energyToBattery / efficiency;
    const rate = getRateByPower(chargerPower, timeType);
    const cost = meterEnergy * rate;
    const timeMinutes = (meterEnergy / chargerPower) * 60;
    const plan = smartTopUp(cost);

    document.getElementById("result").innerHTML =
        "<div class='small'>Vehicle: " + vehicleLabel + "</div>" +
        "<div class='small'>Charger: " + chargerName + " (" + chargerPower + " kW)</div>" +
        "<div class='small'>TOU Rate: " + rate.toFixed(1) + " Baht/kWh (" + (timeType === "peak" ? "Peak" : "Off-Peak") + ")</div><br>" +
        "🔋 Energy Needed: " + meterEnergy.toFixed(2) + " kWh<br>" +
        "⏱ Estimated Time: " + formatTime(timeMinutes) + "<br>" +
        "💰 Estimated Cost: " + cost.toFixed(2) + " Baht<br>" +
        "<div class='highlight'>Top-Up Plan: " + plan.combo.join(" + ") + " = " + plan.total + " Baht</div>" +
        "Remaining Balance: " + plan.leftover.toFixed(2) + " Baht" +
        "<div class='note'>* Estimated time and cost may vary depending on battery condition, charging curve, and temperature.</div>";
}
</script>
