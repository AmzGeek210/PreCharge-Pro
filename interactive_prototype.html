<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProCharge</title>
<style>
:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --input-bg:#f1f5f9;
    --accent:#7c3aed;
    --accent-2:#22d3ee;
    --border:#e2e8f0;
    --shadow:0 8px 24px rgba(15,23,42,0.08);
}
body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#ffffff;
    --muted:#94a3b8;
    --input-bg:#0b1220;
    --accent:#7c3aed;
    --accent-2:#22d3ee;
    --border:#334155;
    --shadow:0 8px 24px rgba(0,0,0,0.35);
}
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    transition:background .25s ease,color .25s ease;
}
.app{
    width:100%;
    max-width:420px;
    padding:20px;
    min-height:100vh;
    box-sizing:border-box;
}
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}
.logo-wrap{
    text-align:center;
    margin-top:8px;
    margin-bottom:10px;
}
.logo{
    width:110px;
    max-width:40%;
    height:auto;
    display:block;
    margin:0 auto 8px;
}
.brand{
    font-size:26px;
    font-weight:700;
}
.subtitle{
    font-size:14px;
    color:var(--muted);
    margin-top:4px;
    line-height:1.5;
    text-align:center;
}
.control-row{
    display:flex;
    gap:10px;
}
.control-row select,
.control-row button{
    margin:0;
}
.card{
    background:var(--card);
    padding:18px;
    border-radius:18px;
    margin-top:18px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
}
label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:2px;
}
select,input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--input-bg);
    color:var(--text);
    box-sizing:border-box;
}
select{
    appearance:none;
}
.range-wrapper{
    margin-bottom:14px;
}
.range-value{
    font-size:14px;
    margin-top:-6px;
    margin-bottom:8px;
    color:var(--accent-2);
}
.button{
    background:var(--accent);
    color:#fff;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    user-select:none;
}
.button:hover{
    filter:brightness(1.05);
}
.result{
    margin-top:15px;
    font-size:14px;
    line-height:1.75;
    color:var(--text);
}
.highlight{
    margin-top:10px;
    font-size:18px;
    font-weight:700;
    color:var(--accent-2);
}
.note{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
}
.small{
    color:var(--muted);
    font-size:13px;
}
.toggle-btn{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    cursor:pointer;
    box-shadow:var(--shadow);
    white-space:nowrap;
}
@media (max-width:420px){
    .control-row{
        flex-direction:column;
    }
}
</style>
</head>
<body>
<div class="app">

    <div class="logo-wrap">
        <img class="logo" src="https://www.pea.co.th/sites/default/files/PEA-Logo.png" alt="PEA Logo">
        <div class="brand">ProCharge</div>
        <div class="subtitle" id="subtitleText">Estimate charging cost before you plug in.</div>
    </div>

    <div class="topbar">
        <div class="control-row" style="width:100%;">
            <select id="languageSelect">
                <option value="th">ไทย</option>
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ms">Melayu</option>
            </select>
            <button class="toggle-btn" id="themeToggle" type="button">Dark Mode</button>
        </div>
    </div>

    <div class="card">
        <label for="brandSelect" id="labelBrand">Select Brand</label>
        <select id="brandSelect">
            <option value="">-- Select Brand --</option>
        </select>

        <label for="carSelect" id="labelModel">Select Model</label>
        <select id="carSelect" disabled>
            <option value="" data-battery="">-- Select Model --</option>
        </select>

        <label for="current" id="labelCurrent">Current Battery (%)</label>
        <input type="number" id="current" value="20" min="0" max="100">

        <label for="target" id="labelTarget">Target Battery (%)</label>
        <div class="range-wrapper">
            <input type="range" id="target" min="10" max="100" value="80">
            <div class="range-value" id="rangeValue">Target: 80%</div>
        </div>

        <label for="timeType" id="labelTime">Time of Use</label>
        <select id="timeType">
            <option value="peak">Peak</option>
            <option value="offpeak">Off-Peak</option>
        </select>

        <label for="charger" id="labelCharger">Charger Type</label>
        <select id="charger">
            <option value="CCS Combo II|25">CCS Combo II (25 kW)</option>
            <option value="CCS Combo II|50">CCS Combo II (50 kW)</option>
            <option value="CCS Combo II|120">CCS Combo II (120 kW)</option>
            <option value="CCS Combo II|300">CCS Combo II (300 kW)</option>

            <option value="AC Type 2|43">AC Type 2 (43 kW)</option>
            <option value="DC CHAdeMO|50">DC CHAdeMO (50 kW)</option>
        </select>

        <div class="button" onclick="calculate()" id="calculateBtn">Calculate</div>
        <div class="result" id="result"></div>
    </div>
</div>

let currentLang = "th";

document.getElementById("target").addEventListener("input", function(){
    document.getElementById("rangeValue").innerText = i18n[currentLang].targetText + ": " + this.value + "%";
});

document.getElementById("languageSelect").addEventListener("change", function(){
    currentLang = this.value;
    applyLanguage();
});

document.getElementById("themeToggle").addEventListener("click", function(){
    document.body.classList.toggle("dark");
    this.textContent = document.body.classList.contains("dark") ? "White Mode" : "Dark Mode";
});

function applyLanguage(){
    const t = i18n[currentLang];
    document.documentElement.lang = currentLang;
    document.getElementById("subtitleText").innerText = t.subtitle;
    document.getElementById("labelBrand").innerText = t.brand;
    document.getElementById("labelModel").innerText = t.model;
    document.getElementById("labelCurrent").innerText = t.current;
    document.getElementById("labelTarget").innerText = t.target;
    document.getElementById("labelTime").innerText = t.time;
    document.getElementById("labelCharger").innerText = t.charger;
    document.getElementById("calculateBtn").innerText = t.calculate;
    document.getElementById("rangeValue").innerText = t.targetText + ": " + document.getElementById("target").value + "%";

    const brandSelect = document.getElementById("brandSelect");
    brandSelect.options[0].text = t.selectBrand;

    const carSelect = document.getElementById("carSelect");
    if (carSelect.options.length > 0) {
        carSelect.options[0].text = t.selectModel;
    }

    const timeType = document.getElementById("timeType");
    timeType.options[0].text = t.peak;
    timeType.options[1].text = t.offpeak;
}

function populateBrands() {
    const brandSelect = document.getElementById("brandSelect");
    const brands = [...new Set(carData.map(car => car.brand))].sort();

    brands.forEach(brand => {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand;
        brandSelect.appendChild(option);
    });
}

function populateModels(selectedBrand) {
    const carSelect = document.getElementById("carSelect");
    carSelect.innerHTML = `<option value="" data-battery="">${i18n[currentLang].selectModel}</option>`;

    if (!selectedBrand) {
        carSelect.disabled = true;
        return;
    }

    const models = carData
        .filter(car => car.brand === selectedBrand)
        .sort((a, b) => a.model.localeCompare(b.model));

    models.forEach(car => {
        const option = document.createElement("option");
        option.value = `${car.brand}|${car.model}|${car.battery}`;
        option.dataset.brand = car.brand;
        option.dataset.battery = car.battery;
        option.textContent = `${car.model} (${car.battery} kWh)`;
        carSelect.appendChild(option);
    });

    carSelect.disabled = false;
}

document.getElementById("brandSelect").addEventListener("change", function(){
    populateModels(this.value);
    document.getElementById("result").innerHTML = "";
});

function getRateByPower(power, timeType){
    if (power < 50){
        return timeType === "peak" ? 6.9 : 5.3;
    } else if (power < 100){
        return timeType === "peak" ? 8.2 : 6.3;
    } else if (power < 300){
        return timeType === "peak" ? 8.5 : 6.5;
    } else {
        return timeType === "peak" ? 9.7 : 7.2;
    }
}

function smartTopUp(cost){
    const targetCost = Math.ceil(cost);
    let bestTotal = null;
    let bestCombo = [];

    const sortedOptions = [...topUpOptions].sort((a, b) => b - a);

    function search(sum, combo, startIndex){
        if (sum >= targetCost){
            const isBetterTotal = bestTotal === null || sum < bestTotal;
            const isSameTotalButFewer = sum === bestTotal && combo.length < bestCombo.length;

            if (isBetterTotal || isSameTotalButFewer){
                bestTotal = sum;
                bestCombo = [...combo];
            }
            return;
        }

        if (bestTotal !== null && sum > bestTotal) return;
        if (bestTotal !== null && sum === bestTotal && combo.length >= bestCombo.length) return;

        for (let i = startIndex; i < sortedOptions.length; i++){
            combo.push(sortedOptions[i]);
            search(sum + sortedOptions[i], combo, i);
            combo.pop();
        }
    }

    search(0, [], 0);

    return {
        combo: bestCombo,
        total: bestTotal,
        leftover: bestTotal - cost
    };
}

function formatTime(totalMinutes){
    const t = i18n[currentLang];
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.round(totalMinutes % 60);

    if (hours <= 0){
        return minutes + " " + t.minutes;
    }
    return hours + "h " + minutes + "m";
}

function calculate(){
    const t = i18n[currentLang];
    const brand = document.getElementById("brandSelect").value;
    const carSelect = document.getElementById("carSelect");
    const selectedOption = carSelect.options[carSelect.selectedIndex];

    const battery = parseFloat(selectedOption.dataset.battery);
    const vehicleLabel = brand && selectedOption.value ? `${brand} ${selectedOption.text}` : "";

    const current = parseFloat(document.getElementById("current").value);
    const target = parseFloat(document.getElementById("target").value);
    const timeType = document.getElementById("timeType").value;

    const chargerRaw = document.getElementById("charger").value;
    const [chargerName, chargerPowerText] = chargerRaw.split("|");
    const chargerPower = parseFloat(chargerPowerText);

    if (!brand){
        document.getElementById("result").innerHTML = t.pleaseBrand;
        return;
    }

    if (!battery){
        document.getElementById("result").innerHTML = t.pleaseModel;
        return;
    }

    if (isNaN(current) || isNaN(target)){
        document.getElementById("result").innerHTML = t.pleaseBattery;
        return;
    }

    if (current < 0 || current > 100 || target < 0 || target > 100){
        document.getElementById("result").innerHTML = t.batteryRange;
        return;
    }

    if (target <= current){
        document.getElementById("result").innerHTML = t.targetHigher;
        return;
    }

    const efficiency = 0.9;
    const percent = (target - current) / 100;
    const energyToBattery = battery * percent;
    const meterEnergy = energyToBattery / efficiency;
    const rate = getRateByPower(chargerPower, timeType);
    const cost = meterEnergy * rate;
    const timeMinutes = (meterEnergy / chargerPower) * 60;
    const plan = smartTopUp(cost);

    document.getElementById("result").innerHTML =
        `<div class="small">${t.vehicle}: ${vehicleLabel}</div>` +
        `<div class="small">${t.chargerText}: ${chargerName} (${chargerPower} kW)</div>` +
        `<div class="small">${t.rate}: ${rate.toFixed(1)} Baht/kWh (${timeType === "peak" ? t.peak : t.offpeak})</div><br>` +
        `${t.energy}: ${meterEnergy.toFixed(2)} kWh<br>` +
        `${t.timeNeeded}: ${formatTime(timeMinutes)}<br>` +
        `${t.cost}: ${cost.toFixed(2)} Baht<br>` +
        `<div class="highlight">${t.topup}: ${plan.combo.join(" + ")} = ${plan.total} Baht</div>` +
        `${t.remain}: ${plan.leftover.toFixed(2)} Baht` +
        `<div class="note">${t.note}</div>`;
}

populateBrands();
applyLanguage();
</script>
