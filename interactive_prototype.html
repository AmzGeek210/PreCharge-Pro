<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProCharge</title>
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
}
.app{
    width:100%;
    max-width:420px;
    padding:20px;
    min-height:100vh;
    box-sizing:border-box;
}
.header{
    margin-top:10px;
    margin-bottom:25px;
}
.title{
    font-size:26px;
    font-weight:700;
}
.subtitle{
    font-size:14px;
    color:#94a3b8;
    margin-top:5px;
    line-height:1.5;
}
.card{
    background:#1e293b;
    padding:18px;
    border-radius:18px;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}
label{
    display:block;
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:2px;
}
select,input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
    box-sizing:border-box;
}
select{
    appearance:none;
}
.range-wrapper{
    margin-bottom:14px;
}
.range-value{
    font-size:14px;
    margin-top:-6px;
    margin-bottom:8px;
    color:#38bdf8;
}
.button{
    background:#7c3aed;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    user-select:none;
}
.button:hover{
    filter:brightness(1.05);
}
.result{
    margin-top:15px;
    font-size:14px;
    line-height:1.7;
    color:#e2e8f0;
}
.highlight{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#22d3ee;
}
.note{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
    line-height:1.5;
}
.small{
    color:#94a3b8;
    font-size:13px;
}
</style>

<div class="app">
    <div class="header">
        <div class="title">ProCharge</div>
        <div class="subtitle">
            Estimate charging cost before you plug in.

    <div class="card">
        <label for="brandSelect">Select Brand</label>
        <select id="brandSelect">
            <option value="">-- Select Brand --</option>

        <label for="carSelect">Select Model</label>
        <select id="carSelect" disabled>
            <option value="" data-battery="">-- Select Model --</option>
        </select>

        <label for="current">Current Battery (%)</label>
        <input type="number" id="current" value="20" min="0" max="100">

        <label for="target">Target Battery (%)</label>
        <div class="range-wrapper">
            <input type="range" id="target" min="10" max="100" value="80">
            <div class="range-value" id="rangeValue">Target: 80%</div>
        </div>

        <label for="timeType">Time of Use</label>
        <select id="timeType">
            <option value="peak">Peak</option>
            <option value="offpeak">Off-Peak</option>
        </select>

        <label for="charger">Charger Type</label>
        <select id="charger">
            <option value="CCS Combo II|25">CCS Combo II (25 kW)</option>
            <option value="CCS Combo II|50">CCS Combo II (50 kW)</option>

            <option value="DC CHAdeMO|50">DC CHAdeMO (50 kW)</option>
        </select>

        <div class="button" onclick="calculate()">Calculate</div>
        <div class="result" id="result"></div>
    </div>
</div>

document.getElementById("target").addEventListener("input", function(){
    document.getElementById("rangeValue").innerText = "Target: " + this.value + "%";
});

function populateBrands() {
    const brandSelect = document.getElementById("brandSelect");
    const brands = [...new Set(carData.map(car => car.brand))].sort();

    brands.forEach(brand => {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand;
        brandSelect.appendChild(option);
    });
}

function populateModels(selectedBrand) {
    const carSelect = document.getElementById("carSelect");
    carSelect.innerHTML = '<option value="" data-battery="">-- Select Model --</option>';

    if (!selectedBrand) {
        carSelect.disabled = true;
        return;
    }

    const models = carData
        .filter(car => car.brand === selectedBrand)
        .sort((a, b) => a.model.localeCompare(b.model));

    models.forEach(car => {
        const option = document.createElement("option");
        option.value = `${car.brand}|${car.model}|${car.battery}`;
        option.dataset.brand = car.brand;
        option.dataset.battery = car.battery;
        option.textContent = `${car.model} (${car.battery} kWh)`;
        carSelect.appendChild(option);
    });

    carSelect.disabled = false;
}

document.getElementById("brandSelect").addEventListener("change", function(){
    populateModels(this.value);
    document.getElementById("result").innerHTML = "";
});

function getRateByPower(power, timeType){
    if (power < 50){
        return timeType === "peak" ? 6.9 : 5.3;
    } else if (power < 100){
        return timeType === "peak" ? 8.2 : 6.3;
    } else if (power < 300){
        return timeType === "peak" ? 8.5 : 6.5;
    } else {
        return timeType === "peak" ? 9.7 : 7.2;
    }
}

function smartTopUp(cost){
    const targetCost = Math.ceil(cost);
    let bestTotal = null;
    let bestCombo = [];

    function search(sum, combo, startIndex){
        if (sum >= targetCost){
            if (bestTotal === null || sum < bestTotal){
                bestTotal = sum;
                bestCombo = [...combo];
            }
            return;
        }

        if (bestTotal !== null && sum >= bestTotal) return;

        for (let i = startIndex; i < topUpOptions.length; i++){
            combo.push(topUpOptions[i]);
            search(sum + topUpOptions[i], combo, i);
            combo.pop();
        }
    }

    search(0, [], 0);

    return {
        combo: bestCombo,
        total: bestTotal,
        leftover: bestTotal - cost
    };
}

function formatTime(totalMinutes){
    const hours = Math.floor(totalMinutes / 60);
    const minutes = Math.round(totalMinutes % 60);

    if (hours <= 0){
        return minutes + " minutes";
    }
    return hours + "h " + minutes + "m";
}

function calculate(){
    const brand = document.getElementById("brandSelect").value;
    const carSelect = document.getElementById("carSelect");
    const selectedOption = carSelect.options[carSelect.selectedIndex];

    const battery = parseFloat(selectedOption.dataset.battery);
    const vehicleLabel = brand && selectedOption.value ? `${brand} ${selectedOption.text}` : "";

    const current = parseFloat(document.getElementById("current").value);
    const target = parseFloat(document.getElementById("target").value);
    const timeType = document.getElementById("timeType").value;

    const chargerRaw = document.getElementById("charger").value;
    const [chargerName, chargerPowerText] = chargerRaw.split("|");
    const chargerPower = parseFloat(chargerPowerText);

    if (!brand){
        document.getElementById("result").innerHTML = "⚠ Please select a brand.";
        return;
    }

    if (!battery){
        document.getElementById("result").innerHTML = "⚠ Please select a model.";
        return;
    }

    if (isNaN(current) || isNaN(target)){
        document.getElementById("result").innerHTML = "⚠ Please enter battery percentages.";
        return;
    }

    if (current < 0 || current > 100 || target < 0 || target > 100){
        document.getElementById("result").innerHTML = "⚠ Battery percentage must be between 0 and 100.";
        return;
    }

    if (target <= current){
        document.getElementById("result").innerHTML = "⚠ Target must be higher than current.";
        return;
    }

    const efficiency = 0.9;
    const percent = (target - current) / 100;
    const energyToBattery = battery * percent;
    const meterEnergy = energyToBattery / efficiency;
    const rate = getRateByPower(chargerPower, timeType);
    const cost = meterEnergy * rate;
    const timeMinutes = (meterEnergy / chargerPower) * 60;
    const plan = smartTopUp(cost);

    document.getElementById("result").innerHTML =
        "<div class='small'>Vehicle: " + vehicleLabel + "</div>" +
        "<div class='small'>Charger: " + chargerName + " (" + chargerPower + " kW)</div>" +
        "<div class='small'>TOU Rate: " + rate.toFixed(1) + " Baht/kWh (" + (timeType === "peak" ? "Peak" : "Off-Peak") + ")</div><br>" +
        "🔋 Energy Needed: " + meterEnergy.toFixed(2) + " kWh<br>" +
        "⏱ Estimated Time: " + formatTime(timeMinutes) + "<br>" +
        "💰 Estimated Cost: " + cost.toFixed(2) + " Baht<br>" +
        "<div class='highlight'>Top-Up Plan: " + plan.combo.join(" + ") + " = " + plan.total + " Baht</div>" +
        "Remaining Balance: " + plan.leftover.toFixed(2) + " Baht" +
        "<div class='note'>* Estimated time and cost may vary depending on battery condition, charging curve, and temperature.</div>";
}
